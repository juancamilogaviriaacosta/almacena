@if(!auth.isLoginRoute()) {
   <header>
      <div class="logo"><span>Almacena</span></div>  
      @if(!auth.isloggedIn()) {
         <nav>
            <a href="#">Inicio</a>
            <a href="#">Funciones</a>
            <a href="#">Precios</a>
            <a href="#">Contacto</a>
         </nav>
         <div class="actions">
            <button class="btn-light" (click)="auth.toLogin()">Login</button>
            <button class="btn-primary">Probar Gratis</button>
         </div>
      } @else {
         <nav>
            <a href="#">Dashboard</a>
            <a href="#">Apps</a>
            <a href="#">Pages</a>
            <a href="#">Components</a>
            <a href="#">Collections</a>
         </nav>
         <div class="actions">
            <button class="btn-light">Email</button>
            <button class="btn-light">Print</button>
            <button class="btn-primary" (click)="auth.logout()">Logout</button>
         </div>
      }
   </header>
}
<router-outlet />
