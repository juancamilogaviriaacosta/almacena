@if(!auth.isLoginRoute()) {
   <header>
      <div class="logo"><span>Almacena</span></div>  
      @if(auth.isloggedIn()) {
         <nav>
            <a href="#">Dashboard</a>
            <a [routerLink]="['/inventory']">Inventario</a>
            <a href="#">Registrar movimiento</a>
            <a href="#">Administrar productos</a>
            <a href="#">Administrar combos</a>
            <a href="#">Registros</a>
         </nav>
         <div class="actions">
            <button class="btn-light">Imprimir</button>
            <button class="btn-primary" (click)="auth.logout()">Cerrar Sesión</button>
         </div>
      } @else {
         <nav>
            <a href="#">Inicio</a>
            <a href="#">Funciones</a>
            <a href="#">Precios</a>
            <a href="#">Contacto</a>
         </nav>
         <div class="actions">
            <button class="btn-light" (click)="auth.toLogin()">Iniciar sesión</button>
            <button class="btn-primary">Probar Gratis</button>
         </div>
      }
   </header>
}
<router-outlet />
