@if(!auth.isLoginRoute()) {
   <header>
      <div class="logo"><span>Almacena</span></div>  
      @if(auth.isloggedIn()) {
         <nav>
            <a [routerLink]="['/dashboard']" routerLinkActive="active">Dashboard</a>
            <a [routerLink]="['/inventory']" routerLinkActive="active">Inventario</a>
            <a [routerLink]="['/movements']" routerLinkActive="active">Registrar movimiento</a>
            <a [routerLink]="['/products']" routerLinkActive="active">Administrar productos</a>
            <a [routerLink]="['/combos']" routerLinkActive="active">Administrar combos</a>
            <a [routerLink]="['/logs']" routerLinkActive="active">Registros</a>
         </nav>
         <div class="actions">
            <button class="btn-light">Imprimir</button>
            <button class="btn-primary" (click)="auth.logout()">Cerrar Sesión</button>
         </div>
      } @else {
         <nav>
            <a href="#">Inicio</a>
            <a href="#">Funciones</a>
            <a href="#">Precios</a>
            <a href="#">Contacto</a>
         </nav>
         <div class="actions">
            <button class="btn-light" (click)="auth.toLogin()">Iniciar sesión</button>
            <button class="btn-primary">Probar Gratis</button>
         </div>
      }
   </header>
}
<router-outlet />
