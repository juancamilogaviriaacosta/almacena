<div class="login-container">
  <div class="login-card">
    <h2>Iniciar Sesión</h2>
    <form #loginForm="ngForm">
      <div class="form-group">
        <label>Usuario</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="model.username"
          required
          placeholder="Ingrese su usuario"
        />
        <small *ngIf="loginForm.submitted && !model.username">
          Usuario requerido
        </small>
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="model.password"
          required
          placeholder="Ingrese su contraseña"
        />
        <small *ngIf="loginForm.submitted && !model.password">
          Contraseña requerida
        </small>
      </div>
      <div class="buttons">
        <button type="submit" class="btn-login" (click)="auth.login()">Ingresar</button>
        <button type="button" class="btn-cancel" (click)="auth.logout()">Cancelar</button>
      </div>
    </form>
  </div>
</div>
