<main class="container">
    <section class="grid">
        <div class="card chart-max">
            <form class="filter-section">
                <label>Buscar: </label>
                <input type="text" [(ngModel)]="criteria" name="criteria" (keydown.enter)="loadData()"/>
                <label>Inicio: </label>
                <input type="date" [(ngModel)]="start" name="start"/>
                <label>Fin: </label>
                <input type="date" [(ngModel)]="end" name="end"/>
                <button type="button" (click)="loadData()">Filtrar</button>
            </form>
        </div>
        <canvas baseChart
            [data]="lineChartData"
            [options]="lineChartOptions"
            [type]="'line'">
        </canvas>
    </section>
</main>
