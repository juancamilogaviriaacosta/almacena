<main class="container">
    <section class="grid">
        <div class="card chart-max">
            @if (product) {
            <form class="form-layout" (ngSubmit)="save()" (keydown.enter)="$event.preventDefault()">
                @for (tmp of product.code; let i = $index; track $index) {
                <div class="autocomplete-row">
                    @if (i===0) {
                    <label>Códigos:</label>
                    } @else {
                    <label>&nbsp;</label>
                    }
                    <input type="text" name="code{{i}}" [(ngModel)]="tmp.code" />
                    @if (i===0) {
                    <button type="button" class="circle-btn" (click)="addCode()">+</button>
                    }
                </div>
                }
                <div>
                    <label for="nombre">Nombre:</label>
                    <input type="text" id="nombre" name="nombre" [(ngModel)]="product.name" />
                </div>
                <div>
                    <label for="precio">Precio:</label>
                    <input type="text" id="precio" name="precio" [(ngModel)]="product.price" />
                </div>
                <div>
                    <label for="categoria">Categoría:</label>
                    <input type="text" id="categoria" name="categoria" [(ngModel)]="product.category" />
                </div>
                <div>
                    <button class="btn btn-primary">Guardar</button>
                    <button type="button" class="btn btn-light" (click)="cancel()">Cancelar</button>
                </div>
            </form>
            }
        </div>
    </section>
</main>

@if (mensajeError !== '') {
    <div class="modal">
    <div class="modal-content">
      <h3>Error</h3>
      <p [innerHTML]="mensajeError"></p>
      <br/>
      <button type="button" class="cancelar" (click)="closeError()">Cerrar</button>
    </div>
    </div>
}
